name: Secret Demo Workflow
on:
  push:
    branches:
      - main
jobs:
  demo-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Use secret properly
        env:
          SECRET_VALUE: ${{ secrets.MY_SECRET_KEY }} 
        run: |
          echo "Secret value is $SECRET_VALUE"
